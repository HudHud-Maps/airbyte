name: Build and Push destination-s3

# Builds the destination-s3 connector image and pushes it to the HudHud Aliyun
# ACR through the shared cicd-reusable-workflows Kaniko template.
#
# This workflow is intentionally scoped to the feature branch used for the OSS
# destination-s3 work. A push to any other branch will not trigger this image
# build.
#
# Final image:
#   hudhud-registry-vpc.me-central-1.cr.aliyuncs.com/private/data/airbyte-destination-s3:<sha8>

on:
  push:
    branches:
      - feature/destination-s3-oss-support
    paths:
      - "airbyte-integrations/connectors/destination-s3/**"
      - "airbyte-cdk/**"
      - "buildSrc/**"
      - "docker-images/**"
      - "settings.gradle"
      - "build.gradle"
      - "gradle.properties"
      - ".github/workflows/build-push-destination-s3.yml"

jobs:
  build-push:
    uses: HudHud-Maps/cicd-reusable-workflows/.github/workflows/build-push-template.yaml@v1.5.1
    secrets: inherit
    with:
      DEPLOYMENT_NAME: data/airbyte-destination-s3
      DOCKER_FILE_PATH: airbyte-integrations/connectors/destination-s3/Dockerfile
      # DOCKER_CONTEXT intentionally unset. Kaniko context remains the repo root
      # so the Dockerfile can copy settings.gradle, buildSrc, airbyte-cdk, and the
      # destination-s3 connector before running Gradle.
      PRODUCTION_BRANCH: master
      STAGING_BRANCH: feature/destination-s3-oss-support
      # The push trigger is already scoped by branch and paths above.
      CHECK_CHANGED_PATH: false
